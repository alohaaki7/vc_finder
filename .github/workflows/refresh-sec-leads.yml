name: Refresh SEC Leads

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/refresh-sec-leads.yml
  workflow_dispatch:
    inputs:
      lead_type:
        description: Lead type to search for
        required: true
        default: vc
        type: choice
        options:
          - vc
          - pe
      days:
        description: Number of days to search
        required: true
        default: "30"
        type: string
  schedule:
    - cron: "17 12 * * *"

permissions:
  contents: write

concurrency:
  group: refresh-sec-leads
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh lead data
        env:
          LEAD_TYPE: ${{ inputs.lead_type || 'vc' }}
          DAYS: ${{ inputs.days || '30' }}
        run: |
          python pipeline.py \
            --type "$LEAD_TYPE" \
            --days "$DAYS" \
            --output ALL_VC_LEADS.csv

      - name: Commit refreshed CSV
        run: |
          if git diff --quiet -- ALL_VC_LEADS.csv; then
            echo "No lead changes found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ALL_VC_LEADS.csv
          git commit -m "Refresh SEC leads"
          git push
